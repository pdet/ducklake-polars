name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ducklake
          POSTGRES_PASSWORD: ducklake
          POSTGRES_DB: ducklake_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ducklake"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,postgres]"

      - name: Run tests (SQLite + PostgreSQL)
        env:
          DUCKLAKE_PG_DSN: "postgresql://ducklake:ducklake@localhost:5432/ducklake_test"
        run: pytest --timeout=120 --timeout-method=thread -q
